version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sample_docs:/app/sample_docs
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./sample_docs:/app/sample_docs
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run src/app/app.py --server.port 8501 --server.address 0.0.0.0
